<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pointage Hafid</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Segoe+UI:wght@900&display=swap');

        body {
            background-color: #000;
            color: #fff;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            padding: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            color: #0000FF; /* Pure Blue */
            font-size: 24px;
            margin: 15px 0;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .app-container {
            width: 100%;
            max-width: 500px;
            background: #000;
            padding: 5px;
            border: 2px solid #333;
            border-radius: 10px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            background-color: #FF0000; /* Pure Red Header */
            color: #0000FF; /* Blue Text in Header */
            padding: 8px 2px;
            font-size: 12px;
            border: 1px solid #333;
            text-transform: uppercase;
        }

        td {
            padding: 3px 1px;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        /* Small Inputs with Yellow Text */
        input {
            background-color: #000;
            color: #FFFF00 !important; /* Yellow Text */
            border: 1px solid #444;
            border-radius: 4px;
            padding: 8px 1px;
            width: 94%;
            font-size: 13px; /* Sghar sghar */
            font-weight: bold;
            text-align: center;
            outline: none;
        }

        input:focus {
            border-color: #0000FF;
        }

        /* Buttons Row Style */
        .btn-del {
            width: 25px;
            height: 25px;
            border-radius: 5px;
            border: none;
            background-color: #222;
            color: #FF0000;
            font-weight: bold;
            font-size: 18px;
            cursor: pointer;
        }

        .btn-add-main { 
            background-color: #0000FF; 
            color: #fff; 
            width: 55px; 
            height: 55px; 
            border-radius: 50%; 
            font-size: 30px; 
            margin: 20px;
            border: 3px solid #fff;
            box-shadow: 0 0 10px rgba(0,0,255,0.5);
            cursor: pointer;
        }

        .footer-actions {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .btn-save { background-color: #FF0000; color: #fff; padding: 12px 25px; border-radius: 25px; border: none; font-weight: bold; font-size: 14px; }
        .btn-clear { background-color: #333; color: #666; padding: 12px 20px; border-radius: 25px; border: none; font-size: 12px; }

        @media print {
            .btn-del, .btn-add-main, .footer-actions { display: none; }
        }
    </style>
</head>
<body>

    <div id="pdf-content" class="app-container">
        <div class="header" style="text-align: center;">POINTAGE HAFID SAJIDI</div>
        <table id="pointageTable">
            <thead>
                <tr>
                    <th style="width: 30%;">Date</th>
                    <th style="width: 25%;">Statut</th>
                    <th>H/E</th>
                    <th>H/S</th>
                    <th style="width: 35px;"></th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>

    <button class="btn-add-main" onclick="addNewRow()">+</button>

    <div class="footer-actions">
        <button class="btn-save" onclick="generatePDF()">TÉLÉCHARGER PDF</button>
        <button class="btn-clear" onclick="clearData()">RESET</button>
    </div>

    <script>
        function saveData() {
            const rows = [];
            document.querySelectorAll('#tableBody tr').forEach(tr => {
                const inputs = tr.querySelectorAll('input');
                if (inputs.length > 0) {
                    rows.push({
                        date: inputs[0].value,
                        status: inputs[1].value,
                        he: inputs[2].value,
                        hs: inputs[3].value
                    });
                }
            });
            localStorage.setItem('hafid_p_final', JSON.stringify(rows));
        }

        function loadData() {
            const saved = localStorage.getItem('hafid_p_final');
            const tableBody = document.getElementById('tableBody');
            tableBody.innerHTML = '';
            
            if (saved && JSON.parse(saved).length > 0) {
                JSON.parse(saved).forEach(item => createRow(item));
            } else {
                for(let i=0; i<5; i++) createRow();
            }
        }

        function createRow(data = {date: '', status: '', he: '', hs: ''}) {
            const tableBody = document.getElementById('tableBody');
            const row = document.createElement('tr');
            row.innerHTML = `
                <td><input type="text" value="${data.date}" placeholder="00/00" oninput="saveData()"></td>
                <td><input type="text" value="${data.status}" placeholder="---" oninput="saveData()"></td>
                <td><input type="time" value="${data.he}" oninput="saveData()"></td>
                <td><input type="time" value="${data.hs}" oninput="saveData()"></td>
                <td><button class="btn-del" onclick="deleteRow(this)">-</button></td>
            `;
            tableBody.appendChild(row);
        }

        function addNewRow() { createRow(); saveData(); }

        function deleteRow(btn) {
            btn.parentElement.parentElement.remove();
            saveData();
        }

        function clearData() {
            if(confirm("Tmseh koulshi?")) {
                localStorage.removeItem('hafid_p_final');
                loadData();
            }
        }

        function generatePDF() {
            const element = document.getElementById('pdf-content');
            // Hide delete buttons for a clean PDF
            const delButtons = document.querySelectorAll('.btn-del');
            delButtons.forEach(b => b.style.visibility = 'hidden');

            const opt = {
                margin: 5,
                filename: 'Pointage_Hafid_Sajidi.pdf',
                image: { type: 'jpeg', quality: 1 },
                html2canvas: { scale: 3, backgroundColor: '#000000' },
                jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                delButtons.forEach(b => b.style.visibility = 'visible');
            });
        }

        window.onload = loadData;
    </script>
</body>
</html>
